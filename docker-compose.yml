# Docker Compose for testing multi-tenant ISR with Nginx reverse proxy
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: episciences-nextjs
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - episciences

  nginx:
    build:
      context: ./docker
      dockerfile: Dockerfile.nginx
    container_name: episciences-nginx
    ports:
      - '${PORT:-8080}:80'
    depends_on:
      app:
        condition: service_healthy
    environment:
      - EPI_ENV=${EPI_ENV:-test}
      - DOMAIN_SUFFIX=${DOMAIN_SUFFIX:-episciences.test}
      - NEXT_UPSTREAM=app:3000
    volumes:
      - ./docker/mock-data:/data:ro
    networks:
      - episciences

networks:
  episciences:
    driver: bridge
