port 26379

# Docker hostname resolution (required for container-based deployments)
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Monitor the master node (quorum = 2 out of 3 sentinels must agree)
sentinel monitor mymaster valkey-node-1 6379 2

# Authentication (must match --requirepass on Valkey nodes)
# Only set when VALKEY_PASSWORD is non-empty
# Note: in Docker compose the sentinel container receives VALKEY_PASSWORD env var.
# For production VMs, set this directly in the sentinel config file.
# sentinel auth-pass mymaster ${VALKEY_PASSWORD}

# Timing parameters
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000
sentinel parallel-syncs mymaster 1
