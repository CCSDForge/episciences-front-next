---
# Tasks executed in the release directory BEFORE the symlink switch
# The shared .env and external-assets are already symlinked at this point

- name: Create external-assets directory in release
  ansible.builtin.file:
    path: "{{ ansistrano_release_path.stdout }}/external-assets"
    state: directory
    mode: '0755'

- name: Sync external-assets directly into release directory
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../../external-assets/"
    dest: "{{ ansistrano_release_path.stdout }}/external-assets/"
    delete: false
    recursive: true
    delay_updates: false
  delegate_to: localhost

- name: Remove stale Next.js build directory if present
  ansible.builtin.shell: rm -rf "{{ ansistrano_release_path.stdout | trim }}/.next"
  changed_when: false

- name: Install Node.js dependencies
  community.general.npm:
    path: "{{ ansistrano_release_path.stdout }}"
    ci: true
    production: false

- name: Build Next.js application
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ ansistrano_release_path.stdout }}"
  environment:
    NODE_ENV: production
  changed_when: true

- name: Copy static assets into standalone output
  ansible.builtin.shell: |
    RELEASE="{{ ansistrano_release_path.stdout | trim }}"
    mkdir -p "$RELEASE/.next/standalone/.next/static"
    mkdir -p "$RELEASE/.next/standalone/public"
    cp -r "$RELEASE/.next/static/." "$RELEASE/.next/standalone/.next/static/"
    cp -r "$RELEASE/public/." "$RELEASE/.next/standalone/public/"
  changed_when: true

- name: Copy .env.local into standalone output
  ansible.builtin.shell: |
    cp -L "{{ ansistrano_release_path.stdout | trim }}/.env.local" \
          "{{ ansistrano_release_path.stdout | trim }}/.next/standalone/.env.local"
  changed_when: true
